<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FaceCheck - Đăng ký</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="auth-container">
        <h1>Đăng ký tài khoản</h1>
        <p class="subtitle">Tạo tài khoản Operator hoặc Viewer</p>
        <form id="registerForm" autocomplete="off">
            <div class="form-group">
                <label>Họ và tên</label>
                <input type="text" id="fullName" placeholder="Nhập họ tên" required>
            </div>
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="regUsername" placeholder="Viết liền không dấu" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="regPassword" placeholder="Tối thiểu 6 ký tự" required>
            </div>
            <div class="form-group">
                <label>Vai trò hệ thống</label>
                <select id="userRole">
                    <option value="Operator">Operator (Có quyền điểm danh)</option>
                    <option value="Viewer">Viewer (Chỉ xem báo cáo)</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="margin-top:12px;">Xác nhận tạo</button>
            <button type="button" class="btn btn-secondary" onclick="window.location.href='./login.html'">Quay lại đăng nhập</button>
        </form>
    </div>
    <script src="./auth.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('regPassword').value;
            if(password.length < 6) return alert('Mật khẩu quá ngắn!');
            
            const success = await AuthManager.register({
                fullName: document.getElementById('fullName').value.trim(),
                username: document.getElementById('regUsername').value.trim().toLowerCase(),
                password: password,
                role: document.getElementById('userRole').value
            });
            if (success) { alert('Đăng ký thành công!'); window.location.href='./login.html'; }
            else alert('Tên đăng nhập đã tồn tại!');
        });
    </script>
</body>
</html>
