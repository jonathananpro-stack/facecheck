<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FaceCheck - Đăng nhập</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="auth-container">
        <div class="logo-fallback" style="margin: 0 auto 16px auto;">📸</div>
        <h1>FaceCheck</h1>
        <p class="subtitle">Hệ thống điểm danh ngoại tuyến an toàn</p>
        <form id="loginForm" autocomplete="off">
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="username" placeholder="Ví dụ: admin" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu" required>
            </div>
            <div class="flex-row">
                <div class="checkbox-group">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe" style="margin-bottom:0; font-weight:normal;">Ghi nhớ đăng nhập</label>
                </div>
                <span id="networkStatus" style="font-size:12px; color:var(--text-muted);">Ngoại tuyến 🟢</span>
            </div>
            <button type="submit" class="btn btn-primary">Đăng nhập</button>
            <button type="button" class="btn btn-secondary" onclick="window.location.href='./register.html'">Đăng ký tài khoản mới</button>
        </form>
    </div>
    <script src="./auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const success = await AuthManager.login(
                document.getElementById('username').value.trim(),
                document.getElementById('password').value,
                document.getElementById('rememberMe').checked
            );
            if (success) window.location.href = './dashboard.html';
            else alert('Tài khoản hoặc mật khẩu không đúng!');
        });
    </script>
</body>
</html>
