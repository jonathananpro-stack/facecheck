<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>FaceCheck Pro - Quản lý Hội nghị</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #f4f7f6; }
        nav { width: 250px; background: #2c3e50; color: white; padding: 20px; }
        nav button { display: block; width: 100%; padding: 15px; margin-bottom: 10px; background: none; border: 1px solid #34495e; color: white; cursor: pointer; text-align: left; transition: 0.3s; }
        nav button:hover { background: #3498db; }
        #mainView { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<body>
    <nav>
        <button onclick="AppEngine.render('home')">🏠 Trang chủ</button>
        <button onclick="AppEngine.render('event')">📅 Hội nghị</button>
        <button onclick="AppEngine.render('camera')">📸 Check-in</button>
        <button onclick="AppEngine.render('report')">📊 Báo cáo</button>
    </nav>

    <div id="mainView"></div>

    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="app.js"></script>
</body>

</body>
</html>
