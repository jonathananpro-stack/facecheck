<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>FaceCheck PRO</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; margin: 0; padding-bottom: 70px; }
        .container { padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #020617; padding: 15px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #334155; padding: 10px; text-align: left; }
    </style>
</head>
<body>
    <div class="container" id="mainView"></div>
    <div class="nav-bar">
        <button onclick="AppEngine.render('events')">📋 Hội nghị</button>
        <button onclick="AppEngine.render('camera')">📷 Check-in</button>
        <button onclick="AppEngine.render('stats')">📊 Báo cáo</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="./app.js"></script>
</body>
</html>
