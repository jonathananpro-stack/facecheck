<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>SEC_CORE_FIXED</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #welcome-screen { text-align: center; }
        #app-screen { display: none; width: 100%; flex-direction: column; align-items: center; }
        button { padding: 20px 40px; font-size: 22px; cursor: pointer; background: #e67e22; color: white; border: none; border-radius: 8px; }
        #video { width: 640px; height: 480px; background: #222; transform: scaleX(-1); }
        table { width: 90%; margin-top: 20px; border-collapse: collapse; }
        th, td { border: 1px solid #444; padding: 10px; text-align: center; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1>SEC_CORE_V2</h1>
        <button id="startBtn">VÀO HỆ THỐNG</button>
    </div>

    <div id="app-screen">
        <video id="video" autoplay playsinline muted></video>
        <table>
            <thead><tr><th>TÊN</th><th>TRẠNG THÁI</th><th>GIỜ</th></tr></thead>
            <tbody id="body"></tbody>
        </table>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        
        startBtn.onclick = async () => {
            try {
                // 1. Cấp quyền
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('video').srcObject = stream;
                document.getElementById('welcome-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'flex';

                // 2. Chờ thư viện load
                if (typeof faceapi === 'undefined') throw new Error("FaceAPI không tải được!");

                // 3. Load Models từ CDN vladmandic (cực kỳ ổn định)
                const M = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                await faceapi.nets.tinyFaceDetector.loadFromUri(M);
                await faceapi.nets.faceLandmark6Net.loadFromUri(M);
                await faceapi.nets.faceRecognitionNet.loadFromUri(M);

                runLoop();
            } catch (e) {
                alert("Lỗi: " + e.message);
            }
        };

        async function runLoop() {
            const video = document.getElementById('video');
            const body = document.getElementById('body');
            const library = JSON.parse(localStorage.getItem('library') || '[]');
            
            setInterval(async () => {
                const det = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                if(det && library.length > 0) {
                    const matcher = new faceapi.FaceMatcher(library.map(p => 
                        new faceapi.LabeledFaceDescriptors(p.name, [new Float32Array(Object.values(p.descriptor))])
                    ));
                    const match = matcher.findBestMatch(det.descriptor);
                    if(match.label !== 'unknown' && match.distance < 0.4) {
                        if(!document.getElementById('row-'+match.label)) {
                            body.innerHTML += `<tr id="row-${match.label}"><td>${match.label}</td><td>ĐÃ CÓ MẶT</td><td>${new Date().toLocaleTimeString()}</td></tr>`;
                        }
                    }
                }
            }, 1000);
        }
    </script>
</body>
</html>
