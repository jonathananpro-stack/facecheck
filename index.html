<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>SEC_CORE Neural System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="home-screen" class="screen">
        <h1 class="glow-text">SEC_CORE V6</h1>
        <div class="grid">
            <button onclick="window.location.href='#'">Huấn luyện AI</button>
            <button onclick="window.location.href='#'">Tạo cuộc họp</button>
            <button onclick="window.location.href='#'">Lịch sử</button>
        </div>
    </div>
    <script>
        // Hiệu ứng "AI thở" - log hệ thống
        setInterval(() => {
            const log = document.createElement('div');
            log.className = 'system-log';
            log.innerText = "SEC_CORE_SYS: [" + new Date().toLocaleTimeString() + "] IDLE_SCAN...";
            document.body.appendChild(log);
            setTimeout(() => log.remove(), 2000);
        }, 3000);
    </script>
</body>
</html>
