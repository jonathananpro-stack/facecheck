<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <!-- THẺ QUAN TRỌNG CHO IPHONE: Chống zoom, ép tỷ lệ 1:1 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEC_CORE V3 - MẮT THẦN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="title">SEC_CORE
            <button id="tab-train" class="tab-btn active" onclick="CORE.ui.switchMode('TRAIN')">⚙️ HUẤN LUYỆN</button>
            <button id="tab-combat" class="tab-btn" onclick="CORE.ui.switchMode('COMBAT')">🎯 TRỰC CHIẾN</button>
        </div>
        <div id="sys-status" class="status-blink" style="color: #ffaa00;">SYS: [ ĐANG KHỞI TẠO ]</div>
    </header>

    <!-- MODULE 1: HUẤN LUYỆN -->
    <div id="module-train" class="module active main-hud">
        <div class="panel">
            <div class="panel-header">HÀNG ĐỢI<button class="btn-mini" onclick="CORE.ui.openDatabaseModal()">📁 DATA</button></div>
            <div class="panel-body"><div class="queue-grid" id="face-queue"></div></div>
        </div>
        <div class="viewport-wrapper">
            <div class="viewport" id="viewport-container">
                <div id="zoom-layer"><video id="vid" autoplay playsinline muted></video><img id="img-view"><canvas id="out"></canvas></div>
                <div class="crosshair" id="crosshair"></div>
            </div>
            <div class="panel" style="height: auto; padding: 10px;">
                <div class="controls-grid">
                    <button class="btn" onclick="document.getElementById('media-upload').click()">📂 NẠP</button>
                    <button class="btn" onclick="CORE.media.startCamera('vid')">🔄 CAM</button>
                    <button class="btn" onclick="CORE.ai.extractFacesTrain()">⚡ QUÉT</button>
                    <button class="btn btn-danger" onclick="CORE.media.clearSource()">💥 HỦY</button>
                </div>
            </div>
        </div>
        <div class="panel"><div class="panel-header">NHẬT KÝ HỆ THỐNG</div><div class="panel-body" id="system-logs"></div></div>
    </div>

    <!-- MODULE 2: TRỰC CHIẾN -->
    <div id="module-combat" class="module main-hud" style="display: none;">
        <div class="panel">
            <div class="panel-header">CHỈ HUY CHIẾN DỊCH</div>
            <div class="panel-body" style="display: flex; flex-direction: column; gap: 15px;">
                <div id="session-setup" style="background: rgba(0,255,204,0.05); padding: 15px; border: 1px dashed var(--neon);">
                    <input type="text" id="session-name" class="cyber-input" placeholder="> Tên Phiên (VD: Cuộc họp A)...">
                    <button class="btn" onclick="CORE.combat.startSession()" style="width: 100%; margin-top: 10px;">🚀 KHỞI TẠO</button>
                </div>
                <div id="session-active" style="display:none; flex-direction: column; align-items: center; gap: 15px;">
                    <div style="color: var(--neon); font-weight: bold; font-size: 1.1rem;" id="lbl-session-name">---</div>
                    <div style="border: 2px dashed var(--neon); border-radius: 50%; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center;">
                        <span id="combat-count" style="font-size: 2rem; font-weight: bold;">0</span>
                    </div>
                    <button class="btn" id="btn-scan-live" onclick="CORE.combat.toggleScan()" style="width: 100%;">🔴 BẬT RADAR</button>
                    <button class="btn" onclick="CORE.media.startCamera('combat-vid')" style="width: 100%;">MỞ CAMERA</button>
                    <button class="btn btn-danger" onclick="CORE.combat.endSession()" style="width: 100%;">🛑 KẾT THÚC</button>
                </div>
            </div>
        </div>
        <div class="viewport-wrapper">
            <div class="viewport" style="border-color: var(--alert);">
                <video id="combat-vid" autoplay playsinline muted style="display:none;"></video>
                <canvas id="combat-out"></canvas>
            </div>
        </div>
        <div class="panel">
            <div class="panel-header">ĐỐI TƯỢNG LẠ</div>
            <div class="panel-body" style="padding: 0;">
                <div id="unknown-zone" style="padding: 10px; background: rgba(255,51,51,0.05); display: none;">
                    <span style="color: var(--alert); font-weight: bold; font-size: 0.8rem;">⚠️ CẦN GÁN NHÃN: <span id="unknown-count">0</span></span>
                    <div style="display: flex; gap: 10px; overflow-x: auto; margin-top: 10px;" id="combat-unknown-queue"></div>
                </div>
                <div style="padding: 15px;" id="combat-log"></div>
            </div>
        </div>
    </div>

    <!-- MODAL GÁN NHÃN -->
    <div id="label-modal" class="modal-overlay">
        <div class="panel modal-box">
            <div class="panel-header">GÁN NHÃN MỤC TIÊU</div>
            <div class="panel-body modal-body-flex">
                <img id="modal-img" src="">
                <div id="ai-suggestion-box" style="display:none; text-align: center; color: var(--neon);">
                    Hỏi: Có phải <b id="ai-suggestion-name">Anh A</b>?
                </div>
                <input type="hidden" id="modal-id"><input type="hidden" id="modal-descriptor"><input type="hidden" id="modal-matched-id">
                <input type="text" id="modal-name" class="cyber-input" placeholder="> NHẬP TÊN">
                <input type="text" id="modal-unit" class="cyber-input" placeholder="> ĐƠN VỊ / MÃ SỐ">
                <div style="display: flex; gap: 10px; width: 100%;">
                    <button class="btn" id="btn-save-target" style="flex: 1;" onclick="CORE.db.saveTarget()">💾 LƯU</button>
                    <button class="btn btn-danger" style="flex: 1;" onclick="CORE.ui.closeModal()">HỦY</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DATA -->
    <div id="database-modal" class="modal-overlay">
        <div class="panel modal-box" style="width: 90%;">
            <div class="panel-header">DỮ LIỆU ĐÃ HỌC <span id="db-count">0</span></div>
            <div class="panel-body" style="max-height: 50vh;"><div class="queue-grid" id="saved-grid"></div></div>
            <div style="padding: 10px; display: flex; gap: 5px;">
                <button class="btn" style="flex: 1; font-size: 0.7rem;" onclick="CORE.db.exportData()">💾 XUẤT .SEC</button>
                <button class="btn" style="flex: 1; font-size: 0.7rem;" onclick="document.getElementById('import-file').click()">📂 NẠP .SEC</button>
                <input type="file" id="import-file" style="display: none;" accept=".sec" onchange="CORE.db.importData(event)">
                <button class="btn btn-danger" style="flex: 1; font-size: 0.7rem;" onclick="CORE.ui.closeDatabaseModal()">ĐÓNG</button>
            </div>
        </div>
    </div>

    <input type="file" id="media-upload" accept="image/*,video/*" onchange="CORE.media.handleUpload(event)" style="display:none;">
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script src="core.js"></script>
</body>
</html>
