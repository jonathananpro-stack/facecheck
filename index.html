<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>SEC_CORE Ultimate V6</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #00ffcc; font-family: 'Courier New', monospace; }
        .page { display: none; height: 100vh; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        #home { display: flex; }
        .canvas-container { position: relative; margin-top: 20px; }
        #overlay { position: absolute; top: 0; left: 0; pointer-events: none; }
        .queue-item { border: 1px solid #00ffcc; padding: 10px; margin: 10px; background: #111; display: flex; align-items: center; gap: 10px; }
        button { padding: 10px 20px; cursor: pointer; background: #111; color: #00ffcc; border: 1px solid #00ffcc; }
        button:hover { background: #00ffcc; color: #000; }
    </style>
</head>
<body>

    <div id="home" class="page" style="display:flex;">
        <h1>SEC_CORE V6</h1>
        <button onclick="showPage('train')">HUẤN LUYỆN AI</button>
        <button onclick="showPage('cam')">TẠO CUỘC HỌP</button>
    </div>

    <div id="train" class="page">
        <h2>HUẤN LUYỆN AI - NẠP DỮ LIỆU</h2>
        <input type="file" id="media-input" accept="image/*" onchange="processMedia(event)">
        <p id="status">🔍 Chọn file ảnh (khuyên dùng định dạng rõ nét)...</p>
        <div class="canvas-container">
            <img id="media-preview" style="max-width: 600px; display:none;">
            <canvas id="overlay"></canvas>
        </div>
        <div id="queue-container"></div>
        <button onclick="showPage('home')">QUAY LẠI</button>
    </div>

    <script>
        // Load Model
        Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/'),
        ]).then(() => console.log("Model AI Loaded!"));

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
        }

        async function processMedia(e) {
            const img = document.getElementById('media-preview');
            const overlay = document.getElementById('overlay');
            const status = document.getElementById('status');
            const container = document.getElementById('queue-container');
            container.innerHTML = "";

            img.src = URL.createObjectURL(e.target.files[0]);
            img.onload = async () => {
                status.innerText = "⚙️ Đang phân tích khuôn mặt...";
                
                // Tối ưu hóa: Resize ảnh trước khi quét để AI nhận diện tốt hơn
                const scale = Math.min(800 / img.naturalWidth, 1);
                const width = img.naturalWidth * scale;
                const height = img.naturalHeight * scale;

                const detections = await faceapi.detectAllFaces(img, new faceapi.TinyFaceDetectorOptions({ inputSize: 224 }));
                
                overlay.width = width;
                overlay.height = height;
                const ctx = overlay.getContext('2d');
                ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 3;

                if (detections.length === 0) {
                    status.innerText = "❌ Không tìm thấy khuôn mặt. Ảnh chất lượng quá thấp hoặc quá tối.";
                } else {
                    status.innerText = `✅ Tìm thấy ${detections.length} khuôn mặt!`;
                    detections.forEach((det, i) => {
                        ctx.strokeRect(det.box.x * scale, det.box.y * scale, det.box.width * scale, det.box.height * scale);
                        
                        const item = document.createElement('div');
                        item.className = 'queue-item';
                        item.innerHTML = `
                            <input type="text" id="name-${i}" placeholder="Tên nhân sự...">
                            <button onclick="useMic('name-${i}')">🎙️ Voice</button>
                            <button onclick="alert('Đã lưu dữ liệu!')">LƯU</button>
                        `;
                        container.appendChild(item);
                    });
                }
            };
        }

        function useMic(id) {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'vi-VN';
            rec.start();
            rec.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript; };
        }
    </script>
</body>
</html>
