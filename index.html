<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>SEC_CORE Ultimate V6</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #00ffcc; font-family: 'Courier New', monospace; overflow: hidden; }
        .page { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        #home { display: flex; }
        video { width: 60%; border: 2px solid #00ffcc; margin-top: 20px; }
        button { padding: 20px 40px; margin: 10px; cursor: pointer; background: transparent; color: #00ffcc; border: 1px solid #00ffcc; font-weight: bold; transition: 0.3s; }
        button:hover { background: #00ffcc; color: #000; }
        #log-table { color: #fff; width: 80%; border-collapse: collapse; }
        th, td { border: 1px solid #333; padding: 10px; text-align: center; }
    </style>
</head>
<body>

    <div id="home" class="page">
        <h1>SEC_CORE V6</h1>
        <button onclick="showPage('cam')">TẠO CUỘC HỌP</button>
        <button onclick="showPage('report')">BÁO CÁO</button>
    </div>

    <div id="cam" class="page">
        <video id="video" autoplay playsinline muted></video>
        <button onclick="showPage('home')">QUAY LẠI</button>
    </div>

    <div id="report" class="page">
        <h2 style="color:#00ffcc">NHẬT KÝ ĐIỂM DANH</h2>
        <table id="log-table"><thead><tr><th>Thời gian</th></tr></thead><tbody id="log-body"></tbody></table>
        <button onclick="showPage('home')">QUAY LẠI</button>
    </div>

    <script>
        // LOGIC TOÀN CỤC
        async function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(pageId).style.display = 'flex';

            const video = document.getElementById('video');
            if (pageId === 'cam') {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    video.srcObject = stream;
                    // Tự động lưu log khi mở camera (demo)
                    const row = document.getElementById('log-body').insertRow();
                    row.insertCell(0).innerText = "Họp bắt đầu lúc: " + new Date().toLocaleTimeString();
                } catch (e) { alert("Lỗi Camera: " + e); }
            } else {
                if(video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            }
        }
    </script>
</body>
</html>
