<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>SEC_CORE Ultimate V6</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #00ffcc; font-family: 'Courier New', monospace; }
        .page { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        #home { display: flex; }
        video { width: 60%; border: 2px solid #00ffcc; }
        button { padding: 20px; margin: 10px; cursor: pointer; background: #111; color: #00ffcc; border: 1px solid #00ffcc; }
    </style>
</head>
<body>

    <div id="home" class="page">
        <h1>SEC_CORE V6</h1>
        <button onclick="showPage('cam-page')">TẠO CUỘC HỌP</button>
        <button onclick="alert('Đang phát triển...')">BÁO CÁO</button>
    </div>

    <div id="cam-page" class="page">
        <video id="video" autoplay playsinline muted></video>
        <button onclick="showPage('home')">QUAY LẠI</button>
    </div>

    <script>
        // Hàm điều hướng toàn cục (không bị lỗi liên kết)
        async function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            const target = document.getElementById(pageId);
            target.style.display = 'flex';

            if (pageId === 'cam-page') {
                const video = document.getElementById('video');
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } else {
                // Tắt camera khi quay về
                const video = document.getElementById('video');
                if(video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            }
        }
    </script>
</body>
</html>
