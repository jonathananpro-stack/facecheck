<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>FaceCheck System</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        .view { display: none; padding: 20px; }
        #home { display: block; }
        video { width: 100%; max-width: 400px; border-radius: 10px; background: #000; }
    </style>
</head>
<body>
    <nav>
        <button onclick="showView('home')">Trang chủ</button>
        <button onclick="showView('setup')">Tạo cuộc họp</button>
        <button onclick="showView('attendance')">Điểm danh</button>
    </nav>

    <div id="home" class="view"><h1>Chào mừng!</h1><p>Chọn chức năng để bắt đầu.</p></div>

    <div id="setup" class="view">
        <h1>Tạo cuộc họp</h1>
        <input type="file" id="upload" accept="image/*" multiple>
        <div id="setupList"></div>
    </div>

    <div id="attendance" class="view">
        <h1>Điểm danh</h1>
        <video id="video" autoplay muted playsinline></video>
        <div id="status">Đang khởi động...</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
