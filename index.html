<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>SEC_CORE_V2_PRO</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>

    <div id="sidebar">
        <button onclick="toggleMenu()">☰ Đóng Menu</button>
        <div class="input-box">
            <input type="text" id="manual-name" placeholder="Nhập tên nhân viên...">
            <button onclick="saveManual()">Lưu thủ công</button>
            <button onclick="startVoice()">🎙️ Nhập giọng nói</button>
        </div>
        <hr>
        <button onclick="exportData()">📥 Xuất báo cáo CSV</button>
    </div>

    <div id="main-content">
        <button onclick="toggleMenu()">☰ Menu</button>
        <video id="video" autoplay playsinline muted></video>
        <table id="attendance-table">
            <thead><tr><th>TÊN</th><th>TRẠNG THÁI</th><th>GIỜ</th></tr></thead>
            <tbody id="attendance-body"></tbody>
        </table>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
