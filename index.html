<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FaceCheck AI Pro</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #video { width: 100vw; height: 100vh; object-fit: cover; }
        #start-btn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; font-size: 20px; background: #00f7ff; color: #000; border: none; border-radius: 50px; z-index: 999; }
        #modal { display: none; position: fixed; top: 10%; width: 100%; background: #1a1a1a; padding: 20px; z-index: 1000; }
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #444; padding-bottom: 10px; }
    </style>
</head>
<body>
    <button id="start-btn" onclick="startApp()">KHỞI ĐỘNG HỆ THỐNG</button>
    <video id="video" autoplay muted playsinline></video>
    <div id="modal">
        <h3>Xác thực nhân sự mới</h3>
        <div id="forms"></div>
        <button onclick="saveData()">LƯU TẤT CẢ</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
