<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    <button id="btn">BẮT ĐẦU</button>
    <div id="status"></div>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');

        document.getElementById('btn').onclick = async () => {
            status.innerText = "Đang mở camera...";
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            
            status.innerText = "Đang tải AI...";
            const modelPath = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            await faceapi.loadTinyFaceDetectorModel(modelPath);
            await faceapi.loadFaceLandmarkModel(modelPath);
            await faceapi.loadFaceRecognitionModel(modelPath);
            
            status.innerText = "AI đã sẵn sàng. Đang quét...";
            
            setInterval(async () => {
                const det = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions());
                if (det) status.innerText = "Đã thấy khuôn mặt!";
            }, 1000);
        };
    </script>
</body>
</html>
