<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>SEC_CORE Ultimate V6</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { background: #050505; color: #00ffcc; font-family: sans-serif; }
        .page { display: none; height: 100vh; flex-direction: column; align-items: center; }
        #home { display: flex; }
        #display-area { position: relative; display: inline-block; }
        #preview-img { max-width: 600px; display: block; }
        .face-box { border: 3px solid #00ffcc; position: absolute; }
    </style>
</head>
<body>
    <div id="home" class="page" style="display:flex;">
        <h1>SEC_CORE V6</h1>
        <button onclick="showPage('train')">HUẤN LUYỆN AI</button>
    </div>

    <div id="train" class="page">
        <h2>TRẠNG THÁI: <span id="status">Đang tải model...</span></h2>
        <input type="file" id="upload" accept="image/*" onchange="detect(event)">
        <div id="display-area">
            <img id="preview-img">
        </div>
        <button onclick="showPage('home')">QUAY LẠI</button>
    </div>

    <script>
        // Tải Model
        const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
        Promise.all([faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL)])
               .then(() => document.getElementById('status').innerText = "AI SẴN SÀNG");

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
        }

        async function detect(e) {
            const img = document.getElementById('preview-img');
            const display = document.getElementById('display-area');
            img.src = URL.createObjectURL(e.target.files[0]);
            
            img.onload = async () => {
                document.getElementById('status').innerText = "Đang quét...";
                // Xóa các khung cũ
                document.querySelectorAll('.face-box').forEach(b => b.remove());
                
                const detections = await faceapi.detectAllFaces(img, new faceapi.TinyFaceDetectorOptions({ inputSize: 128 }));
                
                if (detections.length === 0) {
                    document.getElementById('status').innerText = "❌ Không tìm thấy mặt (Thử ảnh khác)";
                } else {
                    document.getElementById('status').innerText = `✅ Tìm thấy ${detections.length} khuôn mặt`;
                    detections.forEach(det => {
                        const box = document.createElement('div');
                        box.className = 'face-box';
                        const scale = img.clientWidth / img.naturalWidth;
                        box.style.left = (det.box.x * scale) + 'px';
                        box.style.top = (det.box.y * scale) + 'px';
                        box.style.width = (det.box.width * scale) + 'px';
                        box.style.height = (det.box.height * scale) + 'px';
                        display.appendChild(box);
                    });
                }
            };
        }
    </script>
</body>
</html>
