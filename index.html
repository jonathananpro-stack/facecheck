<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FaceCheck Pro AI</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #video { width: 100vw; height: 100vh; object-fit: cover; }
        #start-btn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 15px 30px; background: #00f7ff; color: #000; border: none; border-radius: 20px; z-index: 1000; font-weight: bold; }
        #dataModal { display: none; position: fixed; top: 10%; left: 5%; width: 90%; background: rgba(20, 20, 20, 0.95); padding: 20px; border-radius: 20px; border: 1px solid #00f7ff; transition: opacity 0.3s ease; opacity: 0; z-index: 999; }
        #dataModal.active { display: block; opacity: 1; }
        .face-card { background: #1a1a1a; border-left: 4px solid #00f7ff; padding: 15px; margin: 10px 0; border-radius: 10px; }
        input { background: #333; border: none; color: #fff; padding: 8px; margin: 5px 0; width: 90%; }
        .menu-btns { position: fixed; top: 20px; right: 20px; z-index: 99; }
    </style>
</head>
<body>
    <button id="start-btn" onclick="startApp()">KHỞI ĐỘNG HỆ THỐNG</button>
    <div class="menu-btns">
        <button onclick="exportToExcel()">📥 Xuất Excel</button>
    </div>
    <video id="video" autoplay muted playsinline></video>
    <div id="dataModal">
        <h2>Xác thực nhân sự</h2>
        <div id="facesContainer"></div>
        <button onclick="saveAll()">Lưu tất cả dữ liệu</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
