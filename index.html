<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Security Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00f7ff; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        #app { position: relative; width: 100vw; height: 100vh; }
        #video, #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        #overlay { z-index: 2; }
        .hud-border { position: absolute; border: 2px solid #00f7ff; pointer-events: none; transition: all 0.2s ease; }
        #status { position: absolute; top: 20px; left: 20px; z-index: 3; font-size: 14px; letter-spacing: 2px; }
        #start-btn { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); padding: 15px 40px; background: transparent; border: 2px solid #00f7ff; color: #00f7ff; z-index: 4; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="overlay"></canvas>
        <div id="status">HỆ THỐNG SẴN SÀNG</div>
        <button id="start-btn" onclick="startApp()">KHỞI ĐỘNG SCANNER</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
