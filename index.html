<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Security Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00f7ff; font-family: 'Courier New', monospace; overflow: hidden; }
        #app-container { position: relative; width: 100vw; height: 100vh; }
        #video, #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        #overlay { z-index: 2; }
        #ui-status { position: absolute; top: 20px; left: 20px; z-index: 3; font-size: 1.2rem; }
        #input-panel { position: absolute; bottom: 20px; right: 20px; width: 280px; background: rgba(0,0,0,0.85); border: 2px solid #00f7ff; padding: 15px; border-radius: 10px; display: none; z-index: 5; }
        input { background: #111; border: 1px solid #00f7ff; color: #fff; width: 90%; margin: 5px 0; padding: 8px; }
        .btn { cursor: pointer; background: #00f7ff; color: #000; font-weight: bold; padding: 10px; border: none; width: 100%; }
    </style>
</head>
<body>
    <div id="app-container">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="overlay"></canvas>
        <div id="ui-status">LOADING SYSTEM...</div>
        <div id="input-panel">
            <input id="name" placeholder="HỌ TÊN">
            <input id="unit" placeholder="ĐƠN VỊ">
            <button class="btn" onclick="saveData()">LƯU DỮ LIỆU</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
