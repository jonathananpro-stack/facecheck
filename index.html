<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>FaceCheck AI Pro</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #video { width: 100%; height: 100vh; object-fit: cover; }
        #modal { display: none; position: fixed; top: 15%; left: 10%; width: 80%; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 2px solid #00f7ff; z-index: 100; }
        .input-group { margin: 10px 0; }
    </style>
</head>
<body>
    <video id="video" autoplay muted playsinline></video>
    <div id="modal">
        <h3>Phát hiện nhân sự</h3>
        <div id="forms"></div>
        <button onclick="saveData()">Lưu Dữ Liệu</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
