<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>SEC_CORE Ultimate V6</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #00ffcc; font-family: 'Courier New', monospace; overflow: hidden; }
        .page { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        #home { display: flex; }
        video { width: 60%; border: 2px solid #00ffcc; margin-top: 20px; }
        button { padding: 20px 40px; margin: 10px; cursor: pointer; background: transparent; color: #00ffcc; border: 1px solid #00ffcc; font-weight: bold; transition: 0.3s; }
        button:hover { background: #00ffcc; color: #000; }
        .glow-text { text-shadow: 0 0 10px #00ffcc; }
    </style>
</head>
<body>

    <!-- MÀN HÌNH CHỦ -->
    <div id="home" class="page">
        <h1 class="glow-text">SEC_CORE V6</h1>
        <button onclick="showPage('train')">HUẤN LUYỆN AI</button>
        <button onclick="showPage('cam')">TẠO CUỘC HỌP</button>
        <button onclick="showPage('report')">BÁO CÁO</button>
    </div>

    <!-- MÀN HÌNH HUẤN LUYỆN -->
    <div id="train" class="page">
        <h2 class="glow-text">HUẤN LUYỆN AI</h2>
        <video id="v-train" autoplay playsinline muted></video>
        <button onclick="showPage('home')">QUAY LẠI</button>
    </div>

    <!-- MÀN HÌNH CAMERA -->
    <div id="cam" class="page">
        <video id="v-cam" autoplay playsinline muted></video>
        <button onclick="showPage('home')">QUAY LẠI</button>
    </div>

    <!-- MÀN HÌNH BÁO CÁO -->
    <div id="report" class="page">
        <h2 class="glow-text">NHẬT KÝ ĐIỂM DANH</h2>
        <button onclick="showPage('home')">QUAY LẠI</button>
    </div>

    <script>
        async function showPage(pageId) {
            // Ẩn tất cả
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            // Hiện trang chọn
            document.getElementById(pageId).style.display = 'flex';

            // Ngắt tất cả camera cũ
            ['v-train', 'v-cam'].forEach(id => {
                const v = document.getElementById(id);
                if(v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
            });

            // Bật camera cho trang tương ứng
            if (pageId === 'train' || pageId === 'cam') {
                const v = document.getElementById(pageId === 'train' ? 'v-train' : 'v-cam');
                try {
                    v.srcObject = await navigator.mediaDevices.getUserMedia({ video: true });
                } catch (e) { alert("Cấp quyền camera để tiếp tục!"); }
            }
        }
    </script>
</body>
</html>
