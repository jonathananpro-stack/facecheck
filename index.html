<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>SEC_CORE Ultimate V6</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #00ffcc; font-family: 'Courier New', monospace; }
        .page { display: none; height: 100vh; flex-direction: column; align-items: center; padding: 20px; }
        #home { display: flex; }
        .canvas-container { position: relative; margin-top: 20px; }
        #overlay { position: absolute; top: 0; left: 0; }
        .queue-item { border: 1px solid #00ffcc; padding: 10px; margin: 10px; background: #111; }
        button { padding: 15px; cursor: pointer; background: #111; color: #00ffcc; border: 1px solid #00ffcc; margin: 5px; }
        button:hover { background: #00ffcc; color: #000; }
    </style>
</head>
<body>

    <!-- TRANG CHỦ -->
    <div id="home" class="page" style="display:flex;">
        <h1>SEC_CORE V6</h1>
        <button onclick="showPage('train')">HUẤN LUYỆN AI</button>
        <button onclick="showPage('cam')">TẠO CUỘC HỌP</button>
    </div>

    <!-- TRANG HUẤN LUYỆN -->
    <div id="train" class="page">
        <h2>HUẤN LUYỆN AI</h2>
        <input type="file" id="media-input" accept="image/*,video/*" onchange="processMedia(event)">
        <p id="status">🔍 Chọn file để AI bắt đầu quét...</p>
        <div class="canvas-container">
            <video id="media-preview" width="600" style="display:none;"></video>
            <canvas id="overlay"></canvas>
        </div>
        <div id="queue-container"><h3>HÀNG CHỜ XỬ LÝ</h3></div>
        <button onclick="showPage('home')">QUAY LẠI</button>
    </div>

    <script>
        // Load model AI khi trang web vừa tải xong
        faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
        }

        async function processMedia(e) {
            const media = document.getElementById('media-preview');
            const overlay = document.getElementById('overlay');
            const status = document.getElementById('status');
            const file = e.target.files[0];
            
            media.src = URL.createObjectURL(file);
            media.style.display = 'block';
            status.innerText = "🔍 AI đang quét khuôn mặt...";

            media.onloadeddata = async () => {
                const detections = await faceapi.detectAllFaces(media, new faceapi.TinyFaceDetectorOptions());
                
                // Vẽ overlay feedback
                overlay.width = media.videoWidth || media.width;
                overlay.height = media.videoHeight || media.height;
                const ctx = overlay.getContext('2d');
                ctx.strokeStyle = '#00ffcc';
                ctx.lineWidth = 4;
                
                status.innerText = `✅ Phát hiện ${detections.length} khuôn mặt!`;
                
                detections.forEach((det, i) => {
                    ctx.strokeRect(det.box.x, det.box.y, det.box.width, det.box.height);
                    
                    // Cắt mặt vào hàng chờ
                    const item = document.createElement('div');
                    item.className = 'queue-item';
                    item.innerHTML = `
                        <input type="text" placeholder="Nhập tên..." id="name-${i}">
                        <button onclick="useMic('name-${i}')">🎙️ Voice</button>
                        <button onclick="saveItem(this)">LƯU</button>
                    `;
                    document.getElementById('queue-container').appendChild(item);
                });
            };
        }

        function useMic(id) {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'vi-VN';
            rec.start();
            rec.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript; };
        }

        function saveItem(btn) {
            btn.parentElement.style.backgroundColor = "#005544";
            alert("✅ Đã lưu nhân sự vào DB hệ thống!");
        }
    </script>
</body>
</html>
