<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>AI Security Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #00f7ff; font-family: 'Courier New', monospace; }
        #header { padding: 15px; border-bottom: 2px solid #00f7ff; display: flex; justify-content: space-between; }
        #cam-container { width: 100%; height: 200px; background: #000; border-bottom: 1px solid #333; }
        #video { width: 100%; height: 100%; object-fit: contain; }
        #face-list { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .face-card { background: #111; border: 1px solid #333; border-left: 5px solid #ffcc00; padding: 10px; border-radius: 5px; }
        .hud-mini { font-size: 0.7rem; color: #ffcc00; margin-bottom: 5px; text-transform: uppercase; }
        canvas { width: 100%; border-radius: 3px; }
        input { width: 90%; background: #000; border: 1px solid #00f7ff; color: #fff; padding: 5px; margin-bottom: 5px; }
        .btn-act { width: 100%; background: #00f7ff; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="header"><span>SECURITY_CENTER_V1</span><span id="sys-status">READY</span></div>
    <div id="cam-container"><video id="video" autoplay muted playsinline></video></div>
    <div id="face-list"></div>
    <script src="app.js"></script>
</body>
</html>
