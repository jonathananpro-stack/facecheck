<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Multi-Face AI</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; background: #0a0a0a; color: #fff; font-family: sans-serif; }
        #cam-container { width: 100%; height: 250px; background: #000; border-bottom: 3px solid #00f7ff; }
        #video { width: 100%; height: 100%; object-fit: contain; }
        #face-list { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .face-card { background: #1a1a1a; padding: 10px; border-radius: 12px; border: 1px solid #333; }
        canvas.thumb { width: 100%; border-radius: 8px; margin-bottom: 10px; }
        input { width: 90%; padding: 8px; background: #222; border: 1px solid #444; color: #fff; margin-bottom: 5px; }
        button { width: 100%; padding: 8px; background: #00f7ff; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="cam-container">
        <video id="video" autoplay muted playsinline></video>
    </div>
    <div id="face-list"></div>
    <script src="app.js"></script>
</body>
</html>
