<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><title>SEC_CORE V6</title>
<link rel="stylesheet" href="style.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script></head>
<body>
    <div id="home-screen" class="screen">
        <h1 class="glow-text">SEC_CORE V6</h1>
        <div class="grid">
            <button onclick="navigate('training')">HUẤN LUYỆN AI</button>
            <button onclick="navigate('live')">TẠO CUỘC HỌP</button>
            <button onclick="navigate('history')">BÁO CÁO</button>
        </div>
    </div>
    <div id="app-screen" class="screen" style="display:none;">
        <button class="back-btn" onclick="navigate('home')"><i class="fa-solid fa-arrow-left"></i></button>
        <video id="video" autoplay playsinline muted></video>
        <div id="validation-overlay"></div>
    </div>
    <div id="history-screen" class="screen" style="display:none;">
        <button class="back-btn" onclick="navigate('home')"><i class="fa-solid fa-arrow-left"></i></button>
        <h2 class="glow-text">NHẬT KÝ ĐIỂM DANH</h2>
        <div id="log-container" style="color:white; width:80%;"></div>
        <button onclick="Report.downloadCSV()">TẢI XUỐNG CSV</button>
    </div>
    <script type="module" src="app.js"></script>
</body></html>
