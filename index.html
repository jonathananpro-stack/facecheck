<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>FaceCheck Pro AI</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #video-container { width: 100vw; height: 100vh; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; }
        
        /* Menu nổi */
        #menu { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        .btn { padding: 15px; background: rgba(0,0,0,0.6); border: 1px solid #fff; color: white; border-radius: 50px; cursor: pointer; backdrop-filter: blur(5px); }
        
        #ai-status { position: absolute; bottom: 30px; width: 100%; text-align: center; font-size: 1.2rem; text-shadow: 0 0 5px #000; }
    </style>
</head>
<body>
    <div id="video-container">
        <video id="video" autoplay muted playsinline></video>
        <div id="menu">
            <button class="btn" onclick="toggleCamera()">📷 Đổi Camera</button>
            <button class="btn" onclick="viewDatabase()">📂 Danh sách</button>
        </div>
        <div id="ai-status">Đang khởi tạo AI...</div>
    </div>
    <script src="app.js"></script>
</body>
</html>
